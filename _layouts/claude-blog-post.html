<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title_zh | default: page.title_en | default: page.title }} · Claude Blog 译读</title>
  {% if page.source_url %}<link rel="canonical" href="{{ page.source_url }}">{% endif %}
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0e1116; --surface:#161b22; --border:#2a313c; --fg:#e6edf3; --muted:#9aa7b4; --accent:#58a6ff; --pulse:#3fb950;
      --serif:"Source Serif 4","Noto Serif SC",serif; --mono:"JetBrains Mono",monospace; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--serif); line-height:1.75; }
    a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
    .site-header { border-bottom:1px solid var(--border); }
    .header-inner { max-width:760px; margin:0 auto; padding:1rem 1.5rem; font-family:var(--mono); font-size:.85rem; display:flex; gap:1rem; }
    main { max-width:760px; margin:0 auto; padding:2rem 1.5rem 6rem; }
    .post-meta { font-family:var(--mono); font-size:.75rem; color:var(--muted); margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1rem; }
    .post-body h1 { font-size:2rem; line-height:1.3; }
    .post-body img { max-width:100%; height:auto; border-radius:8px; }
    .post-body blockquote { border-left:3px solid var(--border); margin:1rem 0; padding:.2rem 1rem; color:var(--muted); }
    .post-body pre, .post-body code { font-family:var(--mono); background:var(--surface); }
    .post-body pre { padding:1rem; border-radius:8px; overflow-x:auto; }
    .post-body table { border-collapse:collapse; width:100%; } .post-body th, .post-body td { border:1px solid var(--border); padding:.4rem .6rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" data-testid="portal-brand-home-link">← Trending Diggest</a>
      <a href="{{ '/claude-blog/' | relative_url }}" data-testid="claude-blog-index-link">Claude Blog 译读</a>
    </div>
  </header>
  <main>
    <div class="post-meta" data-testid="claude-blog-post-meta">
      {{ page.category }} · {{ page.published_at }}
      {% if page.source_url %} · <a href="{{ page.source_url }}">原文 ↗</a>{% endif %}
    </div>
    <article class="post-body" data-testid="claude-blog-post-body">
      {{ content }}
    </article>
  </main>
</body>
</html>
