<!DOCTYPE html>
<!--
  门户首页 layout（pc-portal-home）。由 sdlc/specs/features/aggregation-portal/ui/prototype.html 还原。
  Hero + 信源导航网格（_data/sources.yml）+ 最新内容流（同仓小源，构建期聚合）。
-->
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} — 多源技术资讯译读聚合</title>
  <meta name="description" content="{{ site.description | strip_newlines | strip }}">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e1116; --surface: #161b22; --border: #2a313c;
      --fg: #e6edf3; --muted: #9aa7b4; --accent: #58a6ff; --pulse: #3fb950;
      --serif: "Source Serif 4", "Noto Serif SC", serif;
      --mono: "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--serif); line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-header { border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 1080px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .site-brand { display: flex; align-items: center; gap: .5rem; font-family: var(--mono); font-weight: 600; color: var(--fg); }
    .brand-pulse { width: 9px; height: 9px; border-radius: 50%; background: var(--pulse); box-shadow: 0 0 8px var(--pulse); }
    .brand-tag { color: var(--muted); font-weight: 400; }
    main { max-width: 1080px; margin: 0 auto; padding: 0 1.5rem 6rem; }

    /* Hero */
    .hero { padding: 4rem 0 2.5rem; border-bottom: 1px solid var(--border); }
    .hero h1 { font-size: 2.4rem; margin: 0 0 .6rem; font-weight: 600; }
    .hero p { font-size: 1.15rem; color: var(--muted); margin: 0; max-width: 46ch; }

    /* 信源导航网格 */
    .section-title { font-family: var(--mono); font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 3rem 0 1rem; }
    .source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }
    .source-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.4rem; transition: border-color .15s; }
    .source-card:hover { border-color: var(--accent); }
    .source-card h3 { margin: 0 0 .4rem; font-family: var(--mono); font-size: 1.05rem; }
    .source-card .kind { font-family: var(--mono); font-size: .68rem; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; padding: .1rem .4rem; margin-left: .5rem; }
    .source-card p { color: var(--muted); font-size: .95rem; margin: .5rem 0 1rem; }

    /* 最新内容流 */
    .stream { list-style: none; padding: 0; margin: 0; }
    .stream li { padding: .9rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 1rem; }
    .stream .src { font-family: var(--mono); font-size: .7rem; color: var(--pulse); }
    .stream time { font-family: var(--mono); font-size: .8rem; color: var(--muted); white-space: nowrap; }
    .stream-empty { color: var(--muted); font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-brand" data-testid="portal-brand-home-link">
        <span class="brand-pulse"></span>
        <span>Trending Diggest <span class="brand-tag">/ 聚合</span></span>
      </a>
    </div>
  </header>

  <main>
    <!-- Hero (SC-04) -->
    <section class="hero" data-testid="portal-hero">
      <h1>多源技术资讯，一处译读聚合</h1>
      <p>GitHub Trending 每日深度分析 · Claude 官方博客中文译读——独立维护的技术信源，单一入口访问。</p>
    </section>

    <!-- 信源导航网格 (SC-04/05/06)：数据来自 _data/sources.yml -->
    <h2 class="section-title">信源</h2>
    <div class="source-grid" data-testid="portal-source-grid">
      {% for card in site.data.sources %}
      <a class="source-card" href="{{ card.entry_url }}" data-testid="source-card-{{ card.key }}">
        <h3>{{ card.title }} <span class="kind">{{ card.kind }}</span></h3>
        <p>{{ card.summary }}</p>
        <span>进入 {{ card.entry_url }} →</span>
      </a>
      {% endfor %}
    </div>

    <!-- 最新内容流：仅同仓小源 (SC-07 占位块存在性)。聚合逻辑由 TASK-003 填充。 -->
    <h2 class="section-title">最新（同仓源）</h2>
    <ul class="stream" data-testid="portal-latest-stream"></ul>
    <p class="stream-empty" data-testid="portal-stream-empty">暂无最新内容</p>
  </main>
</body>
</html>
