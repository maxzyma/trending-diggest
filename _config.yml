title: Trending Diggest
description: >-
  多源技术资讯译读/深读聚合：GitHub Trending 每日深度分析 + Claude 官方博客中文译读，单一入口。
baseurl: ""
url: "https://trending.theuntold.ai"

theme: minima

# 门户宿主仓：只渲染门户首页 + 同仓小源子站。
# 排除 SDLC 产物、原文 HTML、增量状态、仓库元文档——它们不是站点内容。
exclude:
  - README.md
  - CLAUDE.md
  - sdlc/
  - sources/claude-blog/raw/
  - sources/claude-blog/state/
  - vendor/
  - Gemfile
  - Gemfile.lock
