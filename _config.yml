title: Trending Diggest
description: >-
  多源技术资讯译读/深读聚合：GitHub Trending 每日深度分析 + Claude 官方博客中文译读，单一入口。
baseurl: ""
url: "https://trending.theuntold.ai"

# 无主题：门户首页与 claude-blog 子站均用自包含 layout（内联 CSS），不依赖 minima。
# 移除 theme 避免生成未被引用的 /assets/main.css（且 /assets/* 归 CF Worker legacy 301 路由）。

# 首页最新内容流展示条数（SC-08：条数配置化，"若干"非硬编码上限）。
latest_stream_count: 8

# 小源子站：claude-blog 作为 Jekyll collection 渲染到 /claude-blog/ 前缀下（INV-01 / ADR-002）。
# 内容源在 sources/claude-blog/posts/（流水线写入契约），构建前由 pages.yml 复制到 _claude_blog/
# （collection 目录须 _ 前缀；用构建期复制而非 symlink，规避 GitHub Pages safe-mode 忽略 symlink 的风险）。
collections:
  claude_blog:
    output: true
    permalink: /claude-blog/:path/

defaults:
  - scope:
      path: ""
      type: claude_blog
    values:
      layout: claude-blog-post

# 门户宿主仓：只渲染门户首页 + 同仓小源子站（collection）。
# sources/ 是内容源目录（供 collection 复制 + 首页最新流构建期读取），不直接作页面渲染。
# 排除 SDLC 产物、仓库元文档、原始内容源目录。
exclude:
  - README.md
  - CLAUDE.md
  - sdlc/
  - sources/
  - vendor/
  - Gemfile
  - Gemfile.lock
